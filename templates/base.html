<!DOCTYPE html>
<html lang="en" class="h-full dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}Contacts Manager{% endblock %}</title>
  </head>
  <body class="min-h-screen bg-gray-900 text-gray-100">
    <header class="px-6 py-4 border-b border-gray-800">
      <div class="max-w-5xl mx-auto flex items-center justify-between">
        <a href="{{ url_for('main.home') }}" class="text-xl font-semibold"
          >Contacts Manager</a
        >
        <nav class="text-sm text-gray-300">
          <a
            class="underline hover:text-white"
            href="{{ url_for('main.home') }}"
            >Home</a
          >
          <span class="mx-2 text-gray-600">•</span>
          <a class="underline hover:text-white" href="/dev/seed-one"
            >Dev Seed</a
          >
        </nav>
      </div>
    </header>

    <main class="max-w-5xl mx-auto p-6">{% block content %}{% endblock %}</main>
  </body>
</html>
