{% extends "base.html" %} {% block title %}New Contact — Contacts Manager{%
endblock %} {% block content %}
<h2 class="text-lg font-semibold mb-4">New Contact</h2>

<form method="post" class="grid gap-4 max-w-lg">
  <input
    name="name"
    placeholder="Name"
    class="px-3 py-2 rounded bg-gray-800 border border-gray-700"
    required
  />
  <input
    name="email"
    placeholder="Email"
    class="px-3 py-2 rounded bg-gray-800 border border-gray-700"
    required
  />
  <input
    name="phone"
    placeholder="Phone"
    class="px-3 py-2 rounded bg-gray-800 border border-gray-700"
  />
  <div class="flex gap-3">
    <button class="px-3 py-2 rounded bg-indigo-600 hover:bg-indigo-500">
      Create
    </button>
    <a href="{{ url_for('main.home') }}" class="px-3 py-2 rounded bg-gray-700"
      >Cancel</a
    >
  </div>
</form>
{% endblock %}
